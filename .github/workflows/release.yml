name: Release

# Build unsigned macOS arm64 (.dmg) and Windows x64 (.msi/.exe) installers,
# attach them to a draft GitHub Release. Trigger by pushing a `v*` tag, e.g.:
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# UNSIGNED — first-launch UX:
#   - macOS: users must right-click the .app → "Open" the first time (Gatekeeper
#     will refuse a plain double-click on an un-notarized app). System
#     Settings → Privacy & Security → "Open Anyway" also works.
#   - Windows: SmartScreen will show "Windows protected your PC" → "More info"
#     → "Run anyway".
# Once we have an Apple Developer ID + Windows code-signing cert, fill in the
# signing block at the bottom of this file and the experience cleans up.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      # Don't cancel the other build if one platform fails — we still want
      # whichever installer succeeded to make it into the draft release.
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # GitHub-hosted macOS runners are arm64.
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest    # x64 by default.
            rust_target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Run Rust tests
        run: cd src-tauri && cargo test --no-default-features

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ─── Signing (commented until certificates are available) ──────────
          # macOS Developer ID + notarization:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code-signing:
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # Tauri updater signing (run `pnpm tauri signer generate` first):
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "rdbstudio ${{ github.ref_name }}"
          releaseBody: |
            ## rdbstudio ${{ github.ref_name }}

            > **Unsigned build** — first launch needs an extra step:
            > - **macOS (arm64)**: right-click `rdbstudio.app` → **Open** the first time.
            >   Or: System Settings → Privacy & Security → "Open Anyway".
            > - **Windows (x64)**: SmartScreen → "More info" → "Run anyway".
            > Signed builds will land once code-signing certificates are in place.

            See [CHANGELOG.md](https://github.com/luckylee6666/rdbstudio/blob/main/CHANGELOG.md).
          releaseDraft: true
          # Auto-detect pre-releases by tag suffix so v0.1.0-rc.1 doesn't get
          # marked as a stable release. Add more markers (-pre, -dev, ...) here
          # if we adopt them.
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          args: ${{ matrix.args }}
