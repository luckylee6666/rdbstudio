name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e-ubuntu:
    name: E2E (Ubuntu + webkit2gtk-driver)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb

      - name: Setup Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install root frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (dist/)
        run: pnpm build

      - name: Build Tauri app (release)
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Install e2e-tests dependencies
        working-directory: e2e-tests
        run: pnpm install --frozen-lockfile

      - name: Run E2E tests under xvfb
        working-directory: e2e-tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1400x900x24" pnpm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            e2e-tests/test-results/
            e2e-tests/logs/
          if-no-files-found: ignore
